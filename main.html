<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Daigy UI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Google font Install -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- custom css -->
    <link rel="stylesheet" href="./style/main.css">

    <title>Main Page</title>
</head>
<body>
    <header class="navbar bg-white border-b border-gray-200 px-4 md:px-10 py-4">
        <div class="flex-1 flex items-center gap-2">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-8 h-8">
            <h1 class="text-xl font-bold text-slate-800">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2">
            <div class="hidden md:block relative">
                <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-64 bg-slate-50 h-10" />
                <span class="absolute right-3 top-2.5 opacity-40">🔍</span>
            </div>
            <button id="btn-search" class="btn bg-[#4A00FF] hover:bg-[#3a00cc] text-white border-none px-6">
                + New Issue
            </button>
        </div>
    </header>

    <main class="max-w-[1200px] mx-auto px-4 mt-8 space-y-6">
        
        <!-- Toggle Button Section -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 py-6 px-4">
            <div class=" border-gray-200 flex justify-start gap-3">
                <button id="all-btn" class="join-item btn btn-sm bg-[#4A00FF] text-white border px-8">All</button>
                <button id="open-btn" class="join-item btn btn-sm bg-white text-slate-600 px-8">Open</button>
                <button id="close-btn" class="join-item btn btn-sm bg-white text-slate-600 px-8">Closed</button>
            </div>
        </div>

        <!-- Issue Count section -->
        <div class="bg-white rounded-t-xl border-x border-t border-gray-100 p-6 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-50 rounded-full flex items-center justify-center text-indigo-600">
                    <img src="./assets/Aperture.png" alt="" srcset="">
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800"><span id="total-count"></span> Issues</h2>
                    <p class="text-sm text-slate-400">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex gap-4 text-sm font-medium">
                <span class="flex items-center gap-2 text-slate-700"><span class="w-3 h-3 bg-emerald-400 rounded-full"></span> Open</span>
                <span class="flex items-center gap-2 text-slate-700"><span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed</span>
            </div>
        </div>

        <!-- Card Section -->
        <div class="bg-white border-x border-b border-gray-100 rounded-b-xl p-6 shadow-sm">
            <div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                
                

            </div>
        </div>
    </main>

    <!-- Modal Dialog -->
    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
      
    </dialog>

    <!-- Lucid Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <!-- script connected -->
    <script src="./scripts/main.js"></script>
</body>
</html>
