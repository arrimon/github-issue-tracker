<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Daigy UI & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Github Issue Tracker</title>
</head>
<body class="bg-gray-50">
    <section class="h-screen w-full flex justify-center items-center p-4">
        <div class="card w-full max-w-[450px] bg-white shadow-xl border border-gray-100 rounded-xl px-8 py-10 flex flex-col items-center">
            
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-20 mb-4">
            <h2 class="text-3xl font-bold text-slate-800">GitHub Issues Tracker</h2>
            <p class="text-slate-500 mt-1 mb-6 text-lg">Sign in to manage your issues</p>

            <div class="w-full">
                <div class="form-control w-full mb-4">
                    <label class="label font-bold text-slate-700 pb-1">Username</label>
                    <input id="user-name" type="text" placeholder="Enter Username" class="input input-bordered w-full focus:border-indigo-500" />
                    <span class="text-indigo-600 text-sm mt-1">Default: admin</span>
                </div>

                <div class="form-control w-full mb-6">
                    <label class="label font-bold text-slate-700 pb-1">Password</label>
                    <input id="user-password" type="password" placeholder="Enter Password" class="input input-bordered w-full focus:border-indigo-500" />
                    <span class="text-indigo-600 text-sm mt-1">Default: admin123</span>
                </div>

                <button id="login-btn" class="btn bg-[#4A00FF] hover:bg-[#3a00cc] text-white w-full border-none text-lg">Sign In</button>
            </div>

            <div class="divider text-slate-400 my-8 text-sm px-4">OR</div>

            <div class="w-full">
                <p class="text-center text-slate-500 text-sm mb-3">Demo Credentials:</p>
                <div class="bg-slate-50 rounded-lg p-6 border border-gray-50 text-center">
                    <p class="text-slate-700"><strong>Username:</strong> admin</p>
                    <p class="text-slate-700"><strong>Password:</strong> admin123</p>
                </div>
            </div>
            
        </div>
    </section>
    
    <!-- Scripts Connection -->
    <script src="./scripts/login.js"></script>
</body>
</html><link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
